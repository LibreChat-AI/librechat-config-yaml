name: Validate YAML

on:
  pull_request:
    paths:
      - 'librechat-*.yaml'
      - 'scripts/validate_yaml.py'
      - 'scripts/requirements*.txt'
      - '.github/workflows/validate-yaml.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'scripts/requirements*.txt'

      - name: Install dependencies
        run: uv pip sync scripts/requirements.txt --system

      - name: Validate all librechat-*.yaml files
        run: python scripts/validate_yaml.py
