name: Staleness Report

on:
  schedule:
    # Every Sunday at 12:00 UTC
    - cron: '0 12 * * 0'
  workflow_dispatch:
    inputs:
      weeks:
        description: 'Stale threshold in weeks'
        required: false
        default: '4'

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout (full history needed for git blame)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'scripts/requirements*.txt'

      - name: Install dependencies
        run: uv pip sync scripts/requirements.txt --system

      - name: Generate staleness report
        id: report
        run: |
          WEEKS="${{ github.event.inputs.weeks }}"
          WEEKS="${WEEKS:-4}"
          python scripts/report_staleness.py --weeks "$WEEKS" --json > staleness.json
          python scripts/report_staleness.py --weeks "$WEEKS"
          STALE_COUNT=$(python -c "import json; print(len(json.load(open('staleness.json'))['stale']))")
          echo "stale_count=$STALE_COUNT" >> $GITHUB_OUTPUT
          echo "weeks=$WEEKS" >> $GITHUB_OUTPUT

      - name: Open or update tracking issue
        if: steps.report.outputs.stale_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('staleness.json', 'utf8'));
            const week = new Date().toISOString().slice(0, 10);

            const lines = [
              `Generated on ${report.generated_at}.`,
              `Threshold: no model-list change in > **${report.threshold_weeks} weeks**.`,
              `Source file: \`${report.file}\`.`,
              ``,
              `## Stale providers (${report.stale.length})`,
              ``,
              ...report.stale.map(s =>
                `- **${s.provider}** — last changed ${s.last_changed.slice(0, 10)} (${s.days_stale} days ago)`),
              ``,
              `## Fresh providers (${report.fresh.length})`,
              ``,
              report.fresh.length > 0 ? report.fresh.join(', ') : '_none_',
              ``,
              `---`,
              `<sub>Auto-generated by .github/workflows/staleness-report.yml. The issue is updated weekly; close it once stale providers are investigated.</sub>`,
            ];
            const body = lines.join('\n');
            const title = `Provider staleness report (week of ${week})`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'staleness-report',
              state: 'open',
              per_page: 10,
            });

            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                title,
                body,
              });
              core.info(`Updated existing issue #${issues[0].number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['staleness-report', 'automated'],
              });
              core.info(`Created new issue #${issue.number}`);
            }
